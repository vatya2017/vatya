<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="1000" height="460" font-family="'Helvetica Neue', Arial, 'Malgun Gothic', sans-serif">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <filter id="icon-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <!-- Icon fill colors -->
    <linearGradient id="ic1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="ic2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <linearGradient id="ic3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="ic4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="ic5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="460" fill="#ffffff"/>
  <!-- Top accent bar -->
  <rect width="1000" height="4" fill="#6366f1"/>

  <!-- Header -->
  <text x="500" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="4">MARKETING WORKFLOW</text>
  <text x="500" y="88" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a" letter-spacing="-0.5">마케팅 업무 흐름</text>
  <line x1="420" y1="102" x2="580" y2="102" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ── Connector arrows ── -->
  <line x1="222" y1="252" x2="262" y2="252" stroke="url(#arrow-grad)" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="402" y1="252" x2="442" y2="252" stroke="url(#arrow-grad)" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="582" y1="252" x2="622" y2="252" stroke="url(#arrow-grad)" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="762" y1="252" x2="802" y2="252" stroke="url(#arrow-grad)" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════ CARD TEMPLATE (x offset, gradient id, icon path, step, name, sub1, sub2) ════════════ -->

  <!-- ── STEP 1: 기획 ── -->
  <g transform="translate(62,150)" filter="url(#card-shadow)">
    <!-- Card -->
    <rect width="160" height="200" rx="20" fill="white" stroke="#f1f5f9" stroke-width="1.5"/>
    <!-- Top color strip -->
    <rect width="160" height="5" rx="3" fill="url(#ic1)" y="0"/>
    <rect width="160" height="2" fill="url(#ic1)" y="3"/>
    <!-- Icon circle -->
    <circle cx="80" cy="76" r="34" fill="#eef2ff" filter="url(#icon-shadow)"/>
    <!-- Lightbulb icon -->
    <g transform="translate(57,54)">
      <path d="M23 4C14.7 4 8 10.7 8 19C8 24.5 10.9 29.3 15.2 32.1L15.2 38L30.8 38L30.8 32.1C35.1 29.3 38 24.5 38 19C38 10.7 31.3 4 23 4Z" fill="none" stroke="#6366f1" stroke-width="2.2" stroke-linejoin="round"/>
      <line x1="17" y1="38" x2="29" y2="38" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
      <line x1="18.5" y1="42.5" x2="27.5" y2="42.5" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
      <line x1="23" y1="0" x2="23" y2="-4" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="6" x2="3" y2="3" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
      <line x1="40" y1="6" x2="43" y2="3" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
      <circle cx="23" cy="19" r="4" fill="#6366f1" opacity="0.3"/>
    </g>
    <!-- Step badge -->
    <rect x="12" y="120" width="34" height="18" rx="9" fill="#eef2ff"/>
    <text x="29" y="132.5" text-anchor="middle" font-size="10" font-weight="700" fill="#6366f1">01</text>
    <!-- Name -->
    <text x="80" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">기획</text>
    <!-- Sub labels -->
    <text x="80" y="178" text-anchor="middle" font-size="11" fill="#94a3b8">목표 설정 · 전략 수립</text>
    <text x="80" y="193" text-anchor="middle" font-size="11" fill="#94a3b8">타겟 분석</text>
  </g>

  <!-- ── STEP 2: 콘텐츠 제작 ── -->
  <g transform="translate(242,150)" filter="url(#card-shadow)">
    <rect width="160" height="200" rx="20" fill="white" stroke="#f1f5f9" stroke-width="1.5"/>
    <rect width="160" height="5" rx="3" fill="url(#ic2)" y="0"/>
    <rect width="160" height="2" fill="url(#ic2)" y="3"/>
    <circle cx="80" cy="76" r="34" fill="#fff1f2" filter="url(#icon-shadow)"/>
    <!-- Pencil icon -->
    <g transform="translate(57,54)">
      <rect x="20" y="2" width="12" height="36" rx="3" fill="none" stroke="#f43f5e" stroke-width="2.2" transform="rotate(-45 26 20)"/>
      <path d="M5 37L9 26L20 37Z" fill="#f43f5e" opacity="0.8"/>
      <line x1="5" y1="41" x2="41" y2="41" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
    </g>
    <rect x="12" y="120" width="34" height="18" rx="9" fill="#fff1f2"/>
    <text x="29" y="132.5" text-anchor="middle" font-size="10" font-weight="700" fill="#f43f5e">02</text>
    <text x="80" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">콘텐츠 제작</text>
    <text x="80" y="175" text-anchor="middle" font-size="11" fill="#94a3b8">카피 · 디자인 작업</text>
    <text x="80" y="190" text-anchor="middle" font-size="11" fill="#94a3b8">소재 제작</text>
  </g>

  <!-- ── STEP 3: 검토 ── -->
  <g transform="translate(422,150)" filter="url(#card-shadow)">
    <rect width="160" height="200" rx="20" fill="white" stroke="#f1f5f9" stroke-width="1.5"/>
    <rect width="160" height="5" rx="3" fill="url(#ic3)" y="0"/>
    <rect width="160" height="2" fill="url(#ic3)" y="3"/>
    <circle cx="80" cy="76" r="34" fill="#ecfdf5" filter="url(#icon-shadow)"/>
    <!-- Checkmark / review icon -->
    <g transform="translate(57,53)">
      <circle cx="20" cy="20" r="16" fill="none" stroke="#10b981" stroke-width="2.2"/>
      <polyline points="11,20 17,27 29,13" fill="none" stroke="#10b981" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="12" y="120" width="34" height="18" rx="9" fill="#ecfdf5"/>
    <text x="29" y="132.5" text-anchor="middle" font-size="10" font-weight="700" fill="#10b981">03</text>
    <text x="80" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">검토</text>
    <text x="80" y="178" text-anchor="middle" font-size="11" fill="#94a3b8">내부 피드백 · 승인</text>
    <text x="80" y="193" text-anchor="middle" font-size="11" fill="#94a3b8">수정 반영</text>
  </g>

  <!-- ── STEP 4: 배포 ── -->
  <g transform="translate(602,150)" filter="url(#card-shadow)">
    <rect width="160" height="200" rx="20" fill="white" stroke="#f1f5f9" stroke-width="1.5"/>
    <rect width="160" height="5" rx="3" fill="url(#ic4)" y="0"/>
    <rect width="160" height="2" fill="url(#ic4)" y="3"/>
    <circle cx="80" cy="76" r="34" fill="#eff6ff" filter="url(#icon-shadow)"/>
    <!-- Send / deploy icon -->
    <g transform="translate(57,53)">
      <path d="M4 20L36 8L24 36L20 24Z" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-linejoin="round"/>
      <line x1="20" y1="24" x2="36" y2="8" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <rect x="12" y="120" width="34" height="18" rx="9" fill="#eff6ff"/>
    <text x="29" y="132.5" text-anchor="middle" font-size="10" font-weight="700" fill="#3b82f6">04</text>
    <text x="80" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">배포</text>
    <text x="80" y="178" text-anchor="middle" font-size="11" fill="#94a3b8">채널 발행 · 예약</text>
    <text x="80" y="193" text-anchor="middle" font-size="11" fill="#94a3b8">스케줄 관리</text>
  </g>

  <!-- ── STEP 5: 성과 분석 ── -->
  <g transform="translate(782,150)" filter="url(#card-shadow)">
    <rect width="160" height="200" rx="20" fill="white" stroke="#f1f5f9" stroke-width="1.5"/>
    <rect width="160" height="5" rx="3" fill="url(#ic5)" y="0"/>
    <rect width="160" height="2" fill="url(#ic5)" y="3"/>
    <circle cx="80" cy="76" r="34" fill="#fffbeb" filter="url(#icon-shadow)"/>
    <!-- Bar chart icon -->
    <g transform="translate(57,53)">
      <rect x="3"  y="24" width="9" height="12" rx="2" fill="#f59e0b"/>
      <rect x="15" y="16" width="9" height="20" rx="2" fill="#f59e0b"/>
      <rect x="27" y="8"  width="9" height="28" rx="2" fill="#f59e0b"/>
      <line x1="0" y1="37" x2="40" y2="37" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round"/>
      <!-- trend line -->
      <polyline points="7,22 19,14 31,6" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="2,2"/>
    </g>
    <rect x="12" y="120" width="34" height="18" rx="9" fill="#fffbeb"/>
    <text x="29" y="132.5" text-anchor="middle" font-size="10" font-weight="700" fill="#f59e0b">05</text>
    <text x="80" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">성과 분석</text>
    <text x="80" y="175" text-anchor="middle" font-size="11" fill="#94a3b8">KPI 측정 · 리포트</text>
    <text x="80" y="190" text-anchor="middle" font-size="11" fill="#94a3b8">인사이트 도출</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="398" x2="940" y2="398" stroke="#f1f5f9" stroke-width="1"/>
  <text x="500" y="418" text-anchor="middle" font-size="10.5" fill="#cbd5e1" letter-spacing="1">Marketing Workflow  ·  2026</text>
</svg>
